name: Check and Test
on:
  pull_request:
  push:
    branches:
      - master

# Cancel superseded PR runs so a force-push doesn't pile up runners.
# Tag/push-to-master runs do not cancel-in-progress.
concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Compile / lint / unit-test gate.
  # Pure helpers and formatter rules — no real ClickHouse required.
  # Runs on every supported OS to catch platform-specific drift.
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: post-install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check --target native

      - name: moon test (unit)
        run: moon test -p liuhuo23/clickhouse-driver --target native

      - name: lint
        run: |
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code

  # Integration tests against a real ClickHouse server.
  # GitHub Actions `services:` are Linux-only, so we launch the
  # server via `docker run` inside a step — works on both Linux
  # and macOS runners (GitHub-hosted macos-latest ships Docker).
  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLICKHOUSE_INTEGRATION: "1"
      CLICKHOUSE_HOST: 127.0.0.1
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_IMAGE: clickhouse/clickhouse-server:24.8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: post-install
        run: |
          moon version --all
          moon update

      - name: start-clickhouse
        run: |
          docker rm -f clickhouse 2>/dev/null || true
          docker run -d --rm --name clickhouse \
            -p 8123:8123 \
            -e CLICKHOUSE_USER=default \
            -e CLICKHOUSE_PASSWORD="" \
            -e CLICKHOUSE_DB=default \
            "$CLICKHOUSE_IMAGE"

      - name: wait-for-clickhouse
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8123/ping >/dev/null 2>&1; then
              echo "clickhouse ready after ${i} probe(s)"
              exit 0
            fi
            sleep 2
          done
          echo "clickhouse did not become ready within 120s"
          docker logs clickhouse || true
          exit 1

      - name: integration-tests
        run: moon test integration/ --target native

      - name: stop-clickhouse
        if: always()
        run: docker rm -f clickhouse 2>/dev/null || true