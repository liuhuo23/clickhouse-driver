name: publish-package

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-ubuntu
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check --target native

      - name: moon test
        run: moon test -p liuhuo23/clickhouse-driver --target native

      - name: lint
        run: |
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CLICKHOUSE_INTEGRATION: "1"
      CLICKHOUSE_HOST: 127.0.0.1
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: default
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-ubuntu
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: post install
        run: |
          moon version --all
          moon update

      - name: integration tests
        run: moon test integration/ --target native

  publish:
    needs: [check, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-ubuntu
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: post install
        run: |
          moon version --all
          moon update

      # moon publish uses the version field in moon.mod; the git tag must match it.
      - name: verify tag matches moon.mod version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION=$(grep -E '^version[[:space:]]*=' moon.mod | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ -z "$MOD_VERSION" ]; then
            echo "Error: could not parse version from moon.mod"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "Error: tag '$TAG' (version $TAG_VERSION) does not match moon.mod version '$MOD_VERSION'"
            echo "Update moon.mod version before tagging, e.g.:"
            echo "  version = \"$TAG_VERSION\""
            exit 1
          fi
          echo "Version OK: tag $TAG matches moon.mod version $MOD_VERSION"

      - name: publish
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBIT_COMMUNITY_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SECRET" ]; then
            echo "Error: MOONCAKES_MOONBIT_COMMUNITY_TOKEN secret is not set."
            echo "Please contact an admin to grant access to this secret."
            exit 1
          fi
          echo "$SECRET" > ~/.moon/credentials.json
          moon publish
          rm ~/.moon/credentials.json
