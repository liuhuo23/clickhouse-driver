name: publish-package

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

# Don't cancel in-progress publish runs — they are tag-driven and
# finishing one is cheap; cancellation here can leave partial state.
concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: post-install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check --target native

      - name: moon test (unit)
        run: moon test -p liuhuo23/clickhouse-driver --target native

      - name: lint
        run: |
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code

  # Real-environment integration tests on every supported OS.
  # `services:` is Linux-only; docker run inside a step is portable.
  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLICKHOUSE_INTEGRATION: "1"
      CLICKHOUSE_HOST: 127.0.0.1
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_IMAGE: clickhouse/clickhouse-server:24.8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: post-install
        run: |
          moon version --all
          moon update

      - name: start-clickhouse
        run: |
          docker rm -f clickhouse 2>/dev/null || true
          docker run -d --rm --name clickhouse \
            -p 8123:8123 \
            -e CLICKHOUSE_USER=default \
            -e CLICKHOUSE_PASSWORD="" \
            -e CLICKHOUSE_DB=default \
            "$CLICKHOUSE_IMAGE"

      - name: wait-for-clickhouse
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8123/ping >/dev/null 2>&1; then
              echo "clickhouse ready after ${i} probe(s)"
              exit 0
            fi
            sleep 2
          done
          echo "clickhouse did not become ready within 120s"
          docker logs clickhouse || true
          exit 1

      - name: integration-tests
        run: moon test integration/ --target native

      - name: stop-clickhouse
        if: always()
        run: docker rm -f clickhouse 2>/dev/null || true

  publish:
    needs: [check, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: post-install
        run: |
          moon version --all
          moon update

      # moon publish uses the version field in moon.mod; the git tag must match it.
      - name: verify tag matches moon.mod version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION=$(grep -E '^version[[:space:]]*=' moon.mod | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ -z "$MOD_VERSION" ]; then
            echo "Error: could not parse version from moon.mod"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "Error: tag '$TAG' (version $TAG_VERSION) does not match moon.mod version '$MOD_VERSION'"
            echo "Update moon.mod version before tagging, e.g.:"
            echo "  version = \"$TAG_VERSION\""
            exit 1
          fi
          echo "Version OK: tag $TAG matches moon.mod version $MOD_VERSION"

      - name: publish
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBIT_COMMUNITY_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SECRET" ]; then
            echo "Error: MOONCAKES_MOONBIT_COMMUNITY_TOKEN secret is not set."
            echo "Please contact an admin to grant access to this secret."
            exit 1
          fi
          echo "$SECRET" > ~/.moon/credentials.json
          moon publish
          rm ~/.moon/credentials.json